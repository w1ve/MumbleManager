services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mumble-manager-app
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: "Data Source=/data/mumblemanager.db"
      AllowedOrigins: "https://YOUR_DOMAIN.com"
      Jwt__Secret: "YOUR_JWT_SECRET_KEY_MIN_32_CHARS"
      Email__SmtpHost:     "smtp.gmail.com"
      Email__SmtpPort:     "587"
      Email__From:         "YOUR_FROM_EMAIL@example.com"
      Email__FromName:     "MumbleManager"
      Email__AppPassword:  "YOUR_GMAIL_APP_PASSWORD"
      Email__AdminAddress: "YOUR_ADMIN_EMAIL@example.com"
    volumes:
      - app-data:/data
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    container_name: mumble-manager-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/logs:/var/log/nginx
      - ./nginx/logs:/var/log/nginx
    networks:
      - internal
    depends_on:
      - app

volumes:
  app-data:

networks:
  internal:
    driver: bridge
# (already exists above - need to add log volume to nginx)
